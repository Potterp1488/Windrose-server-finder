<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windrose Server Finder</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    h1 { font-size: 42px; margin-bottom: 20px; }
    h2 { margin-top: 30px; }

    input, button {
      display: block;
      width: 100%;
      max-width: 420px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .error { color: red; }
    .success { color: lime; }

    .server {
      background: #111;
      border: 1px solid #333;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Windrose Server Finder</h1>

<h2>Post Server</h2>

<input id="name" placeholder="Server Name" />
<input id="code" placeholder="Invite Code" />
<button id="postBtn">Post</button>

<div id="message"></div>

<h2>Servers</h2>
<div id="list">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 🔑 PASTE YOUR NEW KEY HERE
  const SUPABASE_URL = "https://yfzifzllysjuglaywsdn.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmemlmemxseXNqdWdsYXl3c2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjE1MDEsImV4cCI6MjA5MjQzNzUwMX0.DDTLQUVT-74_eBHTkRBbNW37hwUfcF_Ztn8h9u5dQY0";

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const nameInput = document.getElementById("name");
  const codeInput = document.getElementById("code");
  const postBtn = document.getElementById("postBtn");
  const list = document.getElementById("list");
  const messageBox = document.getElementById("message");

  function showMessage(msg, type = "error") {
    messageBox.className = type;
    messageBox.textContent = msg;
  }

  function clearMessage() {
    messageBox.textContent = "";
    messageBox.className = "";
  }

  async function loadServers() {
    clearMessage();

    const { data, error } = await client
      .from("servers")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      showMessage("Load error: " + error.message);
      return;
    }

    list.innerHTML = "";

    if (!data.length) {
      list.innerHTML = "<p>No servers yet</p>";
      return;
    }

    data.forEach(s => {
      list.innerHTML += `
        <div class="server">
          <strong>${s.server_name}</strong><br>
          Code: ${s.invite_code}
        </div>
      `;
    });
  }

  async function addServer() {
    const name = nameInput.value.trim();
    const code = codeInput.value.trim();

    if (!name || !code) {
      showMessage("Fill in both fields");
      return;
    }

    clearMessage();

    // 🚫 Prevent duplicate invite codes
    const { data: existing } = await client
      .from("servers")
      .select("*")
      .eq("invite_code", code);

    if (existing && existing.length > 0) {
      showMessage("That invite code already exists");
      return;
    }

    const { error } = await client
      .from("servers")
      .insert([
        { server_name: name, invite_code: code, status: "live" }
      ]);

    if (error) {
      showMessage("Post error: " + error.message);
      return;
    }

    showMessage("Server posted!", "success");

    nameInput.value = "";
    codeInput.value = "";

    loadServers();
  }

  postBtn.onclick = addServer;

  loadServers();
</script>

</body>
</html>
