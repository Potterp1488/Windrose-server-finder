<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windrose Server Finder</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b1020;
  color:white;
}

.wrap { max-width:1200px; margin:auto; padding:20px; }

.tag-list { display:flex; flex-wrap:wrap; gap:10px; }

.tag-chip {
  padding:10px 14px;
  background:#1b2a4d;
  border-radius:10px;
  cursor:pointer;
}
.tag-chip.active { background:#6d7cff; }

button { cursor:pointer; }

.server { border:1px solid #333; padding:10px; margin:10px 0; }
</style>
</head>

<body>

<div class="wrap">

<h1>Windrose Server Finder</h1>

<!-- POST FORM -->
<form id="form">
<input name="name" placeholder="Server Name" required><br><br>
<input name="invite_code" placeholder="Invite Code" required><br><br>
<input name="max_players" type="number" placeholder="Max Players" required><br><br>

<div id="postTags" class="tag-list"></div>

<button type="submit">Post Server</button>
</form>

<hr>

<div id="servers"></div>

</div>

<script>

const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let selectedTags = [];

const TAGS = [
"new player friendly","roleplay","modded","vanilla","chill","hardcore",
"pve","survival","events","loot boosted","low pop","high pop",
"no wipe","community"
];

function renderTagButtons() {
  const el = document.getElementById("postTags");
  el.innerHTML = TAGS.map(tag => `
    <div class="tag-chip ${selectedTags.includes(tag) ? "active":""}" onclick="toggleTag('${tag}')">
      ${tag}
    </div>
  `).join("");
}

function toggleTag(tag) {
  if (selectedTags.includes(tag)) {
    selectedTags = selectedTags.filter(t=>t!==tag);
  } else {
    if (selectedTags.length >= 5) {
      alert("Max 5 tags");
      return;
    }
    selectedTags.push(tag);
  }
  renderTagButtons();
}

async function loadServers() {
  const { data } = await db.from("servers").select("*").order("created_at",{ascending:false});
  const el = document.getElementById("servers");

  el.innerHTML = data.map(s=>`
    <div class="server">
      <b>${s.name}</b><br>
      ${s.max_players} players<br>
      ${s.tags?.join(", ") || ""}<br>
      ${s.invite_code}
    </div>
  `).join("");
}

document.getElementById("form").onsubmit = async (e)=>{
  e.preventDefault();

  const form = new FormData(e.target);

  const payload = {
    name: form.get("name"),
    invite_code: form.get("invite_code"),
    max_players: Number(form.get("max_players")),
    tags: selectedTags
  };

  await db.from("servers").insert([payload]);

  selectedTags = [];
  e.target.reset();
  renderTagButtons();
  loadServers();
};

renderTagButtons();
loadServers();

</script>

</body>
</html>
