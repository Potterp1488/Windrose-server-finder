<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Windrose Server Finder</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 40px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: none;
}

button {
  padding: 12px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, purple, cyan);
  color: white;
  cursor: pointer;
}

.server-card {
  background: #1e293b;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.copy-btn {
  padding: 8px;
  border-radius: 6px;
  background: #6366f1;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="container">

<h1>Windrose Server Finder</h1>

<h2>Post Server</h2>

<input id="name" placeholder="Server Name" />
<input id="code" placeholder="Invite Code" />

<input id="region" placeholder="Region (NA, EU, etc.)" />
<input id="playStyle" placeholder="Play Style (PvP, PvE, Mixed)" />

<input id="maxPlayers" placeholder="Max Players" />
<input id="currentPlayers" placeholder="Current Players" />

<input id="discordUrl" placeholder="Discord URL" />
<input id="description" placeholder="Short Description" />

<label style="display:flex; gap:10px; align-items:center;">
  <input id="isModded" type="checkbox" style="width:auto;" />
  Modded Server
</label>

<button id="postBtn">Post Server</button>

<div id="message"></div>

<h2>Servers</h2>
<div id="list">Loading...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://yfizfzillysjuglaywsdn.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmemlmemxseXNqdWdsYXl3c2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjE1MDEsImV4cCI6MjA5MjQzNzUwMX0.DDTLQUVT-74_eBHTkRBbNW37hwUfcF_Ztn8h9u5dQY0";

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// inputs
const nameInput = document.getElementById("name");
const codeInput = document.getElementById("code");
const regionInput = document.getElementById("region");
const playStyleInput = document.getElementById("playStyle");
const maxPlayersInput = document.getElementById("maxPlayers");
const currentPlayersInput = document.getElementById("currentPlayers");
const discordUrlInput = document.getElementById("discordUrl");
const descriptionInput = document.getElementById("description");
const isModdedInput = document.getElementById("isModded");

const postBtn = document.getElementById("postBtn");
const list = document.getElementById("list");
const messageBox = document.getElementById("message");

// load servers
async function loadServers() {
  list.innerHTML = "Loading...";

  const { data, error } = await client
    .from("servers")
    .select("*")
    .eq("status", "live")
    .order("created_at", { ascending: false });

  if (error) {
    list.innerHTML = "Error loading servers";
    return;
  }

  list.innerHTML = "";

  data.forEach(server => {
    const div = document.createElement("div");
    div.className = "server-card";

    div.innerHTML = `
      <div>
        <strong>${server.server_name}</strong><br>
        Code: ${server.invite_code}<br>
        Players: ${server.current_players ?? 0} / ${server.max_players ?? "?"}<br>
        Region: ${server.region || "N/A"}<br>
        Style: ${server.play_style || "N/A"}<br>
        Type: ${server.is_modded ? "Modded" : "Vanilla"}<br>
        Discord: ${server.discord_url || "N/A"}<br>
        ${server.description || ""}
      </div>
      <button class="copy-btn" onclick="navigator.clipboard.writeText('${server.invite_code}')">
        Copy Code
      </button>
    `;

    list.appendChild(div);
  });
}

// post server
postBtn.onclick = async () => {

  if (!nameInput.value || !codeInput.value) {
    messageBox.textContent = "Fill required fields";
    return;
  }

  const { error } = await client.from("servers").insert([
    {
      server_name: nameInput.value,
      invite_code: codeInput.value,
      region: regionInput.value,
      play_style: playStyleInput.value,
      max_players: maxPlayersInput.value ? parseInt(maxPlayersInput.value) : null,
      current_players: currentPlayersInput.value ? parseInt(currentPlayersInput.value) : null,
      discord_url: discordUrlInput.value,
      description: descriptionInput.value,
      is_modded: isModdedInput.checked,
      status: "live"
    }
  ]);

  if (error) {
    messageBox.textContent = "Error posting";
  } else {
    messageBox.textContent = "Posted!";
    loadServers();

    // clear form
    nameInput.value = "";
    codeInput.value = "";
    regionInput.value = "";
    playStyleInput.value = "";
    maxPlayersInput.value = "";
    currentPlayersInput.value = "";
    discordUrlInput.value = "";
    descriptionInput.value = "";
    isModdedInput.checked = false;
  }
};

// initial load
loadServers();

</script>
</body>
</html>
