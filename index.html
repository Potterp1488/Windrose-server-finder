<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windrose Server Finder</title>

<style>
body {
  background:#0e1320;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

.quick-tags {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

.tag-chip {
  background:#1f2a44;
  border:none;
  color:#fff;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.tag-chip.active {
  background:linear-gradient(90deg,#5de0ff,#ff4fd8);
}

.server-card {
  background:#1a2238;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

button {
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Find a Server</h2>

<input id="searchInput" placeholder="Search..." style="width:100%;padding:10px;margin-bottom:10px;">

<div class="quick-tags" id="quickTags"></div>

<hr>

<h2>Post Server</h2>

<input id="name" placeholder="Server name"><br><br>
<input id="maxPlayers" placeholder="Max players"><br><br>

<div id="postTags" class="quick-tags"></div>
<p>Selected Tags: <span id="tagCount">0</span>/5</p>

<button onclick="postServer()">Post Server</button>

<hr>

<h2>Servers</h2>
<div id="serverList"></div>

<script>

// TAGS (clean list)
const TAGS = [
  "Chill / Casual",
  "Hardcore",
  "Modded",
  "New Player Friendly",
  "Roleplay",
  "PvE",
  "Boosted Loot",
  "Base Building",
  "Full Map",
  "Events",
  "Solo/Duo/Trio",
  "Factions",
  "High Pop",
  "Low Pop",
  "Survival",
  "Custom Areas",
  "Loot+",
  "No Base Damage"
];

let servers = [];
let selectedTags = [];
let activeFilter = "";

// RENDER QUICK FILTER TAGS
function renderQuickTags() {
  const el = document.getElementById("quickTags");
  el.innerHTML = TAGS.map(tag => `
    <button class="tag-chip ${activeFilter===tag?'active':''}"
      onclick="toggleFilter('${tag}')">
      ${tag}
    </button>
  `).join("");
}

// RENDER POST TAG SELECTOR
function renderPostTags() {
  const el = document.getElementById("postTags");

  el.innerHTML = TAGS.map(tag => `
    <button class="tag-chip ${selectedTags.includes(tag)?'active':''}"
      onclick="togglePostTag('${tag}')">
      ${tag}
    </button>
  `).join("");

  document.getElementById("tagCount").textContent = selectedTags.length;
}

// TOGGLE POST TAG
function togglePostTag(tag) {
  if (selectedTags.includes(tag)) {
    selectedTags = selectedTags.filter(t => t !== tag);
  } else {
    if (selectedTags.length >= 5) {
      alert("Max 5 tags");
      return;
    }
    selectedTags.push(tag);
  }
  renderPostTags();
}

// TOGGLE FILTER
function toggleFilter(tag) {
  activeFilter = activeFilter === tag ? "" : tag;
  renderQuickTags();
  renderServers();
}

// POST SERVER
function postServer() {
  const name = document.getElementById("name").value;
  const max = document.getElementById("maxPlayers").value;

  if (!name) return alert("Enter name");

  servers.push({
    name,
    max,
    tags:[...selectedTags]
  });

  selectedTags = [];
  renderPostTags();
  renderServers();
}

// RENDER SERVERS
function renderServers() {
  const search = document.getElementById("searchInput").value.toLowerCase();

  let filtered = servers.filter(s =>
    s.name.toLowerCase().includes(search)
  );

  if (activeFilter) {
    filtered = filtered.filter(s => s.tags.includes(activeFilter));
  }

  const el = document.getElementById("serverList");

  el.innerHTML = filtered.map(s => `
    <div class="server-card">
      <h3>${s.name}</h3>
      <p>${s.max} players</p>

      <div class="quick-tags">
        ${s.tags.map(t => `
          <button class="tag-chip"
            onclick="toggleFilter('${t}')">${t}</button>
        `).join("")}
      </div>
    </div>
  `).join("");
}

// SEARCH
document.getElementById("searchInput")
  .addEventListener("input", renderServers);

// INIT
renderQuickTags();
renderPostTags();

</script>

</body>
</html>
