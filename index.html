<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windrose Server Finder</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:Arial;
  color:#fff;
  background:linear-gradient(#040b18,#091427);
  padding:20px;
}

.container { max-width:1200px; margin:auto; }

.panel {
  background:#0d1d3a;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.search-actions {
  display:flex;
  gap:10px;
  margin:10px 0;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#10203c;
  color:white;
}

.btn {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-search { background:#5e7cff; }
.btn-refresh { background:#263b63; }
.btn-clear { background:#3b2f77; }
.btn-delete { background:#d94b5c; }

.filters {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.server {
  background:#14284a;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

.meta {
  font-size:13px;
  opacity:.7;
  margin-top:5px;
}

.actions {
  margin-top:10px;
  display:flex;
  gap:10px;
}
</style>
</head>

<body>
<div class="container">

<div class="panel">
<h2>Find a Server</h2>

<input id="searchInput" placeholder="Search..." />

<div class="search-actions">
<button class="btn btn-refresh" id="refreshBtn">Refresh</button>
<button class="btn btn-search" id="searchBtn">Search</button>
<button class="btn btn-clear" id="clearBtn">Clear</button>
</div>

<div class="filters">
<div>
<label>Sort</label>
<select id="sortSelect">
<option value="newest">Newest</option>
<option value="oldest">Oldest</option>
<option value="name_asc">Name A-Z</option>
<option value="name_desc">Name Z-A</option>
</select>
</div>

<div>
<label>Server Type</label>
<select id="typeFilter">
<option value="">All</option>
<option value="modded">Modded</option>
<option value="vanilla">Vanilla</option>
</select>
</div>
</div>

<div id="serverList"></div>
</div>

<div class="panel">
<h2>Post Server</h2>

<form id="form">
<input name="name" placeholder="Server Name" required><br><br>
<input name="description" placeholder="Description"><br><br>
<input name="invite_code" placeholder="Invite Code" required><br><br>

<select name="server_type">
<option value="modded">Modded</option>
<option value="vanilla">Vanilla</option>
</select><br><br>

<button class="btn btn-search">Post</button>
</form>
</div>

</div>

<script>
const SUPABASE_URL = "https://yfzifzllysjuglaywsdn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmemlmemxseXNqdWdsYXl3c2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjE1MDEsImV4cCI6MjA5MjQzNzUwMX0.DDTLQUVT-74_eBHTkRBbNW37hwUfcF_Ztn8h9u5dQY0";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let ownerToken = localStorage.getItem("owner_token");
if (!ownerToken) {
  ownerToken = crypto.randomUUID();
  localStorage.setItem("owner_token", ownerToken);
}

let allServers = [];

async function loadServers() {
  const { data } = await db.from("servers").select("*").order("created_at",{ascending:false});
  allServers = data || [];
  render(allServers);
}

function applyFilters() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const type = document.getElementById("typeFilter").value;
  const sort = document.getElementById("sortSelect").value;

  let list = allServers.filter(s=>{
    return (!search || s.name.toLowerCase().includes(search))
    && (!type || s.server_type === type);
  });

  if (sort==="newest") list.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if (sort==="oldest") list.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  if (sort==="name_asc") list.sort((a,b)=>a.name.localeCompare(b.name));
  if (sort==="name_desc") list.sort((a,b)=>b.name.localeCompare(a.name));

  render(list);
}

function render(list) {
  const el = document.getElementById("serverList");

  el.innerHTML = list.map(s=>{
    const canDelete = s.owner_token === ownerToken;

    return `
    <div class="server">
      <b>${s.name}</b>
      <div class="meta">${s.server_type}</div>
      <div>${s.description || ""}</div>
      <div class="meta">${s.invite_code}</div>

      <div class="actions">
        ${canDelete ? `<button class="btn btn-delete" onclick="deleteServer('${s.id}')">Delete</button>` : ""}
      </div>
    </div>
    `;
  }).join("");
}

async function deleteServer(id) {
  if (!confirm("Delete this?")) return;

  await db.from("servers")
    .delete()
    .eq("id",id)
    .eq("owner_token",ownerToken);

  loadServers();
}

document.getElementById("form").onsubmit = async e=>{
  e.preventDefault();
  const f = new FormData(e.target);

  await db.from("servers").insert([{
    name:f.get("name"),
    description:f.get("description"),
    invite_code:f.get("invite_code"),
    server_type:f.get("server_type"),
    owner_token:ownerToken
  }]);

  e.target.reset();
  loadServers();
};

document.getElementById("searchBtn").onclick = applyFilters;
document.getElementById("refreshBtn").onclick = loadServers;
document.getElementById("clearBtn").onclick = ()=>{
  document.getElementById("searchInput").value="";
  document.getElementById("typeFilter").value="";
  document.getElementById("sortSelect").value="newest";
  applyFilters();
};

window.deleteServer = deleteServer;

loadServers();
</script>

</body>
</html>
